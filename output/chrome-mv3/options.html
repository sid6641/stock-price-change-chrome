<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ticker Tracker — Options</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #f1f1f1;
      padding: 32px;
      max-width: 480px;
      margin: 0 auto;
    }
    h1 { font-size: 20px; margin-bottom: 24px; }
    .field { margin-bottom: 20px; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #aaa;
    }
    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #333;
      border-radius: 8px;
      background: #212121;
      color: #f1f1f1;
      font-size: 14px;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
    input:focus { outline: none; border-color: #4caf50; }
    .hint { font-size: 12px; color: #888; margin-top: 4px; }
    .actions { display: flex; gap: 8px; margin-top: 24px; }
    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-primary { background: #4caf50; color: #fff; }
    .btn-primary:hover { background: #43a047; }
    .btn-secondary { background: #333; color: #f1f1f1; }
    .btn-secondary:hover { background: #444; }
    .status {
      margin-top: 16px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }
    .status.success { display: block; background: #1b5e20; color: #a5d6a7; }
    .status.error { display: block; background: #b71c1c; color: #ef9a9a; }
  </style>
  <script type="module" crossorigin src="/chunks/options-Dezn_h7o.js"></script>
</head>
<body>
  <h1>⚙️ Ticker Tracker Options</h1>

  <div class="field">
    <label for="gemini">Gemini API Key</label>
    <input type="password" id="gemini" placeholder="AIza..." autocomplete="off">
    <div class="hint">Get one at <a href="https://aistudio.google.com/apikey" target="_blank" style="color:#4caf50">aistudio.google.com/apikey</a></div>
  </div>

  <div class="field">
    <label for="alphavantage">Alpha Vantage API Key</label>
    <input type="password" id="alphavantage" placeholder="demo" autocomplete="off">
    <div class="hint">Get one at <a href="https://www.alphavantage.co/support/#api-key" target="_blank" style="color:#4caf50">alphavantage.co</a> (free, no credit card)</div>
  </div>

  <div class="actions">
    <button class="btn-primary" id="saveBtn">Save</button>
    <button class="btn-secondary" id="clearBtn">Clear</button>
  </div>

  <div class="status" id="status"></div>

</body>
</html>
